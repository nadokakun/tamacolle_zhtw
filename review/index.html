<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tamacolle 翻譯校對工具</title>
  <style>
    :root {
      --bg: #f3eee5;
      --panel: #fffaf3;
      --line: #d8ccbd;
      --ink: #1d1814;
      --muted: #6c6258;
      --accent: #0f766e;
      --accent-2: #1d4ed8;
      --danger: #b45309;
      --success: #166534;
      --shadow: 0 12px 32px rgba(61, 42, 27, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.88), transparent 28%),
        linear-gradient(180deg, #ece3d6 0%, var(--bg) 38%, #efe8dd 100%);
    }

    button, input, select, textarea {
      font: inherit;
      color: inherit;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(255, 250, 243, 0.95);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .toolbar-top,
    .toolbar-bottom {
      display: grid;
      gap: 10px;
      align-items: center;
    }

    .toolbar-top {
      grid-template-columns: minmax(200px, 280px) 160px 1fr auto auto auto;
    }

    .toolbar-bottom {
      grid-template-columns: minmax(180px, 1fr) minmax(180px, 1fr) 140px auto auto auto auto 220px;
    }

    .title {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .title strong {
      font-size: 20px;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
    }

    .main {
      display: grid;
      grid-template-columns: 320px 1fr 1fr;
      gap: 14px;
      padding: 14px;
      min-height: 0;
    }

    .panel {
      min-height: 0;
      background: rgba(255, 250, 243, 0.96);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .panel header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.42);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .panel header strong {
      font-size: 16px;
    }

    .side-tools {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 11px;
      background: #fffdf8;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 12px;
      background: #fffdf8;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    .button-strong {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .button-alt {
      background: var(--accent-2);
      border-color: var(--accent-2);
      color: #fff;
    }

    .button-warn {
      background: #fff4e5;
      border-color: #f0c48b;
      color: #8a4b10;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .file-list {
      overflow: auto;
      min-height: 0;
      padding: 8px;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .file-item {
      text-align: left;
      display: grid;
      gap: 4px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.6);
    }

    .file-item strong {
      font-size: 14px;
      word-break: break-word;
    }

    .file-item span {
      font-size: 12px;
      color: var(--muted);
    }

    .file-item.is-active {
      border-color: var(--accent);
      background: rgba(15, 118, 110, 0.08);
    }

    .pill {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      background: #f0ebe4;
    }

    .pill.is-done {
      background: #dcfce7;
      color: var(--success);
    }

    .pill.is-todo {
      background: #fef3c7;
      color: var(--danger);
    }

    .pill.is-modified {
      background: #dbeafe;
      color: var(--accent-2);
    }

    .content {
      overflow: auto;
      min-height: 0;
      padding: 8px 0;
    }

    .line-list {
      display: grid;
    }

    .line-row {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      padding: 8px 14px;
      border-bottom: 1px solid rgba(216, 204, 189, 0.55);
      align-items: start;
    }

    .line-no {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      user-select: none;
      padding-top: 8px;
    }

    .line-text {
      white-space: pre-wrap;
      line-height: 1.7;
      word-break: break-word;
      padding: 4px 0;
    }

    .line-input-wrap {
      display: grid;
      gap: 4px;
    }

    .line-input {
      min-height: 34px;
      resize: none;
      line-height: 1.6;
      overflow: hidden;
      background: #fff;
    }

    .save-state {
      font-size: 12px;
      color: var(--muted);
    }

    .save-state[data-pending="true"] {
      color: var(--danger);
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 32px 20px;
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      max-width: 420px;
      padding: 12px 14px;
      border-radius: 12px;
      color: #fff;
      background: rgba(29, 24, 20, 0.9);
      box-shadow: var(--shadow);
    }

    .toast[data-type="success"] {
      background: rgba(22, 101, 52, 0.92);
    }

    .toast[data-type="error"] {
      background: rgba(153, 27, 27, 0.92);
    }

    @media (max-width: 1400px) {
      .main {
        grid-template-columns: 280px 1fr 1fr;
      }
      .toolbar-top {
        grid-template-columns: 1fr 140px repeat(4, auto);
      }
      .toolbar-bottom {
        grid-template-columns: 1fr 1fr 120px repeat(4, auto) 180px;
      }
    }

    @media (max-width: 1100px) {
      .toolbar {
        position: static;
      }
      .toolbar-top {
        grid-template-columns: 1fr 1fr;
      }
      .toolbar-bottom {
        grid-template-columns: 1fr 1fr;
      }
      .main {
        grid-template-columns: 1fr;
        grid-template-rows: 220px 42vh 42vh;
      }
      .title {
        grid-column: 1 / -1;
      }
      .stats {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="toolbar">
      <div class="toolbar-top">
        <div class="title">
          <strong>Tamacolle 翻譯校對工具</strong>
          <span class="meta">右側可直接編輯，按 Enter 儲存。首次啟動會在本機建立中文快照。</span>
        </div>
        <label><input id="syncToggle" type="checkbox" checked> 同步卷軸</label>
        <div class="stats">
          <span>檔案 <strong id="fileCount">0</strong></span>
          <span>已校對 <strong id="proofreadCount">0</strong></span>
          <span>已修改 <strong id="modifiedCount">0</strong></span>
        </div>
        <button id="refreshBtn" type="button">重新整理</button>
        <button id="syncRemoteBtn" class="button-warn" type="button">同步雲端</button>
        <button id="pushBtn" class="button-strong" type="button">推送 GitHub</button>
      </div>

      <div class="toolbar-bottom">
        <input id="replaceFind" type="text" placeholder="快速取代: 尋找">
        <input id="replaceTo" type="text" placeholder="快速取代: 取代成">
        <select id="replaceScope">
          <option value="current">目前檔案</option>
          <option value="all">所有檔案</option>
        </select>
        <label><input id="caseSensitive" type="checkbox" checked> 大小寫區分</label>
        <label><input id="useRegex" type="checkbox"> Regex</label>
        <button id="replacePreviewBtn" type="button">預覽</button>
        <button id="replaceRunBtn" type="button">全部取代</button>
        <input id="commitMessage" type="text" placeholder="提交訊息，可留空">
      </div>

      <div class="meta" id="replaceStatus">快速取代會先顯示預覽，正式執行時會建立本機備份。</div>
      <div class="meta" id="gitSummary">讀取中...</div>
    </section>

    <main class="main">
      <aside class="panel">
        <header>
          <strong>檔案清單</strong>
          <span id="currentFile">尚未選擇檔案</span>
        </header>
        <div class="side-tools">
          <input id="fileSearch" type="search" placeholder="搜尋檔名">
          <select id="proofreadFilter">
            <option value="all">全部檔案</option>
            <option value="todo">只看未校對</option>
            <option value="done">只看已校對</option>
            <option value="modified">只看已修改</option>
          </select>
          <div class="stats">
            <button id="markDoneBtn" class="button-alt" type="button">標記已校對</button>
            <button id="markTodoBtn" type="button">取消校對</button>
          </div>
          <div class="meta" id="currentMeta"></div>
        </div>
        <div class="file-list" id="fileList"></div>
      </aside>

      <section class="panel">
        <header>
          <strong>日文原文</strong>
          <span>ja_noruby/raw</span>
        </header>
        <div class="content" id="jpPane"></div>
      </section>

      <section class="panel">
        <header>
          <strong>中文翻譯</strong>
          <span>zh_tw/raw</span>
        </header>
        <div class="content" id="zhPane"></div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast" hidden></div>
  <script src="./app.js"></script>
</body>
</html>

<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tamacolle 翻譯校對工具</title>
  <style>
    :root {
      --bg: #f3eee5;
      --panel: #fffaf3;
      --line: #d8ccbd;
      --ink: #1d1814;
      --muted: #6c6258;
      --accent: #0f766e;
      --accent-2: #1d4ed8;
      --danger: #b45309;
      --success: #166534;
      --shadow: 0 12px 32px rgba(61, 42, 27, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.88), transparent 28%),
        linear-gradient(180deg, #ece3d6 0%, var(--bg) 38%, #efe8dd 100%);
    }

    button, input, select, textarea {
      font: inherit;
      color: inherit;
    }

    .app {
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 100vh;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(255, 250, 243, 0.95);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
    }

    .toolbar-top,
    .toolbar-bottom {
      display: grid;
      gap: 10px;
      align-items: center;
    }

    .toolbar-top {
      grid-template-columns: minmax(220px, 360px) 1fr auto auto auto;
    }

    .toolbar-bottom {
      grid-template-columns: minmax(180px, 1fr) minmax(180px, 1fr) 140px auto auto auto auto 220px;
    }

    .title {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .title strong {
      font-size: 20px;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .startup-status {
      position: sticky;
      top: 110px;
      z-index: 4;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 8px 16px;
      background: rgba(255, 250, 243, 0.92);
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      backdrop-filter: blur(8px);
    }

    .startup-status.is-busy {
      color: var(--ink);
    }

    .startup-status.is-ready {
      color: var(--success);
    }

    .startup-status-main {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .startup-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
      flex: 0 0 auto;
    }

    .startup-status.is-busy .startup-dot {
      animation: pulse 1.2s ease-in-out infinite;
    }

    .startup-status.is-ready .startup-dot {
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(22, 101, 52, 0.12);
      animation: none;
    }

    .startup-text {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
    }

    .startup-text strong,
    .startup-text span {
      min-width: 0;
      word-break: break-word;
    }

    .startup-progress {
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .main {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 14px;
      padding: 14px;
      min-height: 0;
    }

    .main.is-sidebar-collapsed {
      grid-template-columns: 1fr;
    }

    .sidebar-reopen {
      display: none;
      position: fixed;
      left: 14px;
      top: 180px;
      z-index: 6;
      box-shadow: var(--shadow);
      background: rgba(255, 250, 243, 0.96);
    }

    .sidebar-reopen.is-visible {
      display: inline-flex;
    }

    .panel {
      min-height: 0;
      background: rgba(255, 250, 243, 0.96);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .panel header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.42);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .panel header strong {
      font-size: 16px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .collapse-btn {
      padding: 6px 10px;
      line-height: 1;
      min-width: 0;
      white-space: nowrap;
    }

    .sidebar-panel.is-collapsed {
      display: none;
    }

    .side-tools {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 11px;
      background: #fffdf8;
    }

    input[type="checkbox"] {
      width: auto;
      margin: 0;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 12px;
      background: #fffdf8;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    .button-strong {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .button-alt {
      background: var(--accent-2);
      border-color: var(--accent-2);
      color: #fff;
    }

    .button-warn {
      background: #fff4e5;
      border-color: #f0c48b;
      color: #8a4b10;
    }

    .toggle-inline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      color: var(--ink);
    }

    .file-list {
      overflow: auto;
      min-height: 0;
      padding: 8px;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .file-item {
      text-align: left;
      display: grid;
      gap: 4px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.6);
    }

    .file-item strong {
      font-size: 14px;
      word-break: break-word;
    }

    .file-item span {
      font-size: 12px;
      color: var(--muted);
    }

    .file-item.is-active {
      border-color: var(--accent);
      background: rgba(15, 118, 110, 0.08);
    }

    .pill {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      background: #f0ebe4;
    }

    .pill.is-done {
      background: #dcfce7;
      color: var(--success);
    }

    .pill.is-todo {
      background: #fef3c7;
      color: var(--danger);
    }

    .pill.is-modified {
      background: #dbeafe;
      color: var(--accent-2);
    }

    .content {
      overflow: auto;
      min-height: 0;
      padding: 0;
    }

    .compare-header {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(320px, 1fr);
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.32);
    }

    .compare-head-cell {
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      font-weight: 700;
    }

    .compare-head-cell + .compare-head-cell {
      border-left: 1px solid rgba(216, 204, 189, 0.7);
    }

    .compare-list {
      display: grid;
    }

    .compare-row {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(320px, 1fr);
      border-bottom: 1px solid rgba(216, 204, 189, 0.55);
      align-items: stretch;
    }

    .compare-cell {
      min-width: 0;
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 10px;
      padding: 6px 12px;
      align-items: start;
    }

    .compare-cell + .compare-cell {
      border-left: 1px solid rgba(216, 204, 189, 0.45);
    }

    .line-no {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      user-select: none;
      padding-top: 9px;
      text-align: right;
    }

    .line-text {
      white-space: pre-wrap;
      line-height: 1.6;
      word-break: break-word;
      padding: 8px 0;
      min-height: 42px;
    }

    .line-editor {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
    }

    .line-input {
      min-height: 42px;
      resize: none;
      line-height: 1.6;
      overflow: hidden;
      background: #fff;
      padding: 8px 12px;
    }

    .save-state {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      align-self: center;
      padding-top: 10px;
    }

    .save-state[data-pending="true"] {
      color: var(--danger);
    }

    .save-state[data-state="saving"] {
      color: var(--accent-2);
    }

    .save-state[data-state="error"] {
      color: #991b1b;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 32px 20px;
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      max-width: 420px;
      padding: 12px 14px;
      border-radius: 12px;
      color: #fff;
      background: rgba(29, 24, 20, 0.9);
      box-shadow: var(--shadow);
    }

    .toast[data-type="success"] {
      background: rgba(22, 101, 52, 0.92);
    }

    .toast[data-type="error"] {
      background: rgba(153, 27, 27, 0.92);
    }

    .progress-modal[hidden] {
      display: none;
    }

    .progress-modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(29, 24, 20, 0.26);
      backdrop-filter: blur(4px);
    }

    .progress-card {
      width: min(560px, 100%);
      display: grid;
      gap: 12px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 250, 243, 0.98);
      box-shadow: var(--shadow);
    }

    .progress-card h2 {
      margin: 0;
      font-size: 20px;
    }

    .progress-message {
      color: var(--muted);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .progress-log {
      max-height: 240px;
      overflow: auto;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fffdf8;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .progress-actions {
      display: flex;
      justify-content: flex-end;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(15, 118, 110, 0.2);
      border-top-color: var(--accent);
      border-radius: 999px;
      animation: spin 0.8s linear infinite;
    }

    .progress-head {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(0.72); opacity: 0.65; }
    }

    @media (max-width: 1400px) {
      .toolbar-top {
        grid-template-columns: 1fr repeat(3, auto) auto;
      }

      .toolbar-bottom {
        grid-template-columns: 1fr 1fr 120px repeat(4, auto) 180px;
      }

      .startup-status {
        top: 142px;
      }
    }

    @media (max-width: 1100px) {
      .toolbar,
      .startup-status {
        position: static;
      }

      .toolbar-top,
      .toolbar-bottom,
      .main,
      .compare-row,
      .compare-header,
      .startup-status {
        grid-template-columns: 1fr;
      }

      .title,
      .stats {
        grid-column: 1 / -1;
      }

      .compare-head-cell + .compare-head-cell,
      .compare-cell + .compare-cell {
        border-left: 0;
        border-top: 1px solid rgba(216, 204, 189, 0.45);
      }

      .sidebar-reopen {
        top: auto;
        bottom: 20px;
        left: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="toolbar">
      <div class="toolbar-top">
        <div class="title">
          <strong>Tamacolle 翻譯校對工具</strong>
          <span class="meta">右側可直接編輯，按 Enter 儲存。首次啟動會先在本機建立中日文快照。</span>
        </div>
        <div class="stats">
          <span>檔案 <strong id="fileCount">0</strong></span>
          <span>已校對 <strong id="proofreadCount">0</strong></span>
          <span>已修改 <strong id="modifiedCount">0</strong></span>
        </div>
        <button id="refreshBtn" type="button">重新整理</button>
        <button id="syncRemoteBtn" class="button-warn" type="button">同步雲端</button>
        <button id="pushBtn" class="button-strong" type="button">推送 GitHub</button>
      </div>

      <div class="toolbar-bottom">
        <input id="replaceFind" type="text" placeholder="快速取代: 尋找">
        <input id="replaceTo" type="text" placeholder="快速取代: 取代成">
        <select id="replaceScope">
          <option value="current">目前檔案</option>
          <option value="all">全部檔案</option>
        </select>
        <label class="toggle-inline"><input id="caseSensitive" type="checkbox" checked><span>大小寫區分</span></label>
        <label class="toggle-inline"><input id="useRegex" type="checkbox"><span>Regex</span></label>
        <button id="replacePreviewBtn" type="button">預覽</button>
        <button id="replaceRunBtn" type="button">全部取代</button>
        <input id="commitMessage" type="text" placeholder="提交訊息，可留空">
      </div>

      <div class="meta" id="replaceStatus">快速取代會先顯示預覽，正式執行時會建立本機備份。</div>
    </section>

    <section class="startup-status is-busy" id="startupStatusBar" data-phase="boot">
      <div class="startup-status-main">
        <div class="startup-dot" aria-hidden="true"></div>
        <div class="startup-text">
          <strong id="startupStatusText">初始化中</strong>
          <span id="startupStatusDetail">正在準備本機快照...</span>
        </div>
      </div>
      <div></div>
      <strong class="startup-progress" id="startupStatusProgress"></strong>
    </section>

    <button id="reopenSidebarBtn" class="collapse-btn sidebar-reopen" type="button" aria-expanded="false">展開檔案列表</button>

    <main class="main">
      <aside class="panel sidebar-panel" id="sidebarPanel">
        <header>
          <div class="panel-title">
            <strong>檔案清單</strong>
            <button id="toggleSidebarBtn" class="collapse-btn" type="button" aria-expanded="true">收合</button>
          </div>
          <span id="currentFile">尚未選擇檔案</span>
        </header>
        <div class="side-tools">
          <input id="fileSearch" type="search" placeholder="搜尋檔名">
          <select id="proofreadFilter">
            <option value="all">全部檔案</option>
            <option value="todo">未校對</option>
            <option value="done">已校對</option>
            <option value="modified">已修改</option>
          </select>
          <div class="stats">
            <button id="markDoneBtn" class="button-alt" type="button">標記已校對</button>
            <button id="markTodoBtn" type="button">取消校對</button>
          </div>
          <div class="meta" id="currentMeta"></div>
        </div>
        <div class="file-list" id="fileList"></div>
      </aside>

      <section class="panel">
        <header>
          <strong>原文與翻譯對照</strong>
          <span>ja_noruby/raw ↔ zh_tw/raw</span>
        </header>
        <div class="compare-header">
          <div class="compare-head-cell">
            <span>日文原文</span>
            <span>ja_noruby/raw</span>
          </div>
          <div class="compare-head-cell">
            <span>中文翻譯</span>
            <span>zh_tw/raw</span>
          </div>
        </div>
        <div class="content" id="comparePane"></div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast" hidden></div>
  <div class="progress-modal" id="progressModal" hidden>
    <div class="progress-card">
      <div class="progress-head">
        <div class="spinner" id="progressSpinner"></div>
        <h2 id="progressTitle">處理中</h2>
      </div>
      <div class="progress-message" id="progressMessage"></div>
      <pre class="progress-log" id="progressLog" hidden></pre>
      <div class="progress-actions">
        <button id="progressCloseBtn" type="button" hidden>關閉</button>
      </div>
    </div>
  </div>

  <script src="./app.js" type="module"></script>
</body>
</html>
